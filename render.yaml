databases:
  - name: pokedex-db
    plan: free
    databaseName: pokedex_v2
    user: pokedex_user

services:
  - type: web
    name: pokedex-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "webapp.app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pokedex-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: PYTHON_VERSION
        value: "3.13.0"