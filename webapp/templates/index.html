<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Web App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#" onclick="app && app.showHome(); return false;"> Pokédex</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" onclick="app && app.showHome(); return false;">Home</a>
                <a class="nav-link" href="#" onclick="app && app.showList(); return false;">Pokédex</a>
                <a class="nav-link" href="#" onclick="alert('Stats dashboard coming in Phase 4'); return false;">Stats</a>
                <a class="nav-link" href="#" onclick="alert('Battle mode coming in Phase 5'); return false;">Battle</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div id="app" style="min-height: 60vh;">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading Pokédex...</p>
        </div>
    </div>
</div>

<footer class="bg-light py-4 mt-5">
    <div class="container text-center text-muted">
        <p class="mb-0">Pokédex Web App © 2025</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
