<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Web App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#" onclick="if (window.app) { app.currentView = app.isAuthenticated ? 'home' : 'landing'; app.render(); } return false;">
            🔴 Pokédex
        </a>
        <span class="nav-item" id="user-info" style="color: white; margin-right: 20px;">
            <!-- Will be populated by JS -->
        </span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#" id="nav-home">
                    🏠 Home
                </a>
                <a class="nav-link" href="#" id="nav-pokedex">
                    📘 Pokédex
                </a>
                <a class="nav-link" href="#" id="nav-battle">
                    ⚔️ Battle
                </a>
                <a class="nav-link" href="#" id="nav-login">
                    🔐 Login
                </a>
                <a class="nav-link" href="#" id="logout-btn" style="display: none;">
                    🚪 Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div id="app" style="min-height: 60vh;">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Initializing Pokédex...</p>
        </div>
    </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
        <p class="mb-0">Pokédex Web App © 2026</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
    /**
     * Update navbar with user info and links after app initialization
     */
    const originalInit = PokemonAppV2.prototype.init;
    PokemonAppV2.prototype.init = async function() {
        await originalInit.call(this);
        
        const navHome = document.getElementById('nav-home');
        const navLogin = document.getElementById('nav-login');
        const userInfo = document.getElementById('user-info');
        const logoutBtn = document.getElementById('logout-btn');
        const navPokedex = document.getElementById('nav-pokedex');
        const navBattle = document.getElementById('nav-battle');
        
        // Common navigation wiring
        navHome.onclick = (e) => {
            e.preventDefault();
            this.currentView = this.isAuthenticated ? 'home' : 'landing';
            this.render();
        };

        navPokedex.onclick = (e) => {
            e.preventDefault();
            if (!this.isAuthenticated) {
                this.currentView = 'login';
            } else {
                this.currentView = 'pokedex';
            }
            this.render();
        };

        navBattle.onclick = (e) => {
            e.preventDefault();
            if (!this.isAuthenticated) {
                this.currentView = 'login';
            } else {
                this.currentView = 'battle';
            }
            this.render();
        };

        navLogin.onclick = (e) => {
            e.preventDefault();
            this.currentView = 'login';
            this.render();
        };
        
        if (this.isAuthenticated && this.user) {
            userInfo.innerHTML = this.user.picture
                ? `<img src="${this.user.picture}" alt="Profile" style="width:32px;height:32px;border-radius:50%;margin-right:8px;"> ${this.user.name}`
                : `👤 ${this.user.name}`;

            navLogin.style.display = 'none';
            logoutBtn.onclick = (e) => {
                e.preventDefault();
                this.logout();
            };
            logoutBtn.style.display = 'block';
        } else {
            userInfo.innerHTML = '';
            logoutBtn.style.display = 'none';
            navLogin.style.display = 'block';
        }
    };
</script>
</body>
</html>
